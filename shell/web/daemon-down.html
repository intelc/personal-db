<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>PersonalDB — daemon not running</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #0f172a;
        color: #e2e8f0;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        margin: 0;
      }
      .card {
        max-width: 30rem;
        padding: 2rem;
        text-align: center;
      }
      h1 { font-size: 1.25rem; margin-bottom: 0.5rem; }
      p { color: #94a3b8; line-height: 1.5; }
      code {
        background: #1e293b;
        padding: 0.15rem 0.4rem;
        border-radius: 4px;
        color: #2dd4bf;
      }
      button {
        margin-top: 1.25rem;
        padding: 0.6rem 1.4rem;
        font-size: 0.95rem;
        border: none;
        border-radius: 6px;
        background: #2dd4bf;
        color: #0f172a;
        font-weight: 600;
        cursor: pointer;
      }
      button:active { transform: translateY(1px); }
      .detail { font-size: 0.8rem; color: #64748b; margin-top: 1rem; }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>🔴 daemon not running</h1>
      <p>
        PersonalDB couldn't reach the sync daemon at
        <code id="daemon-url">http://127.0.0.1:8765</code>.
      </p>
      <p>Start it from a terminal, then retry:</p>
      <p><code>personal-db daemon install</code></p>
      <button id="retry">Retry</button>
      <p class="detail" id="detail"></p>
    </div>
    <script type="module">
      // Tauri v2 exposes the invoke bridge on window.__TAURI__ when the
      // `withGlobalTauri` build option is enabled (see tauri.conf.json) so
      // this bundled, non-bundled-by-npm page can call back into Rust
      // without a JS build step.
      const params = new URLSearchParams(window.location.search);
      const daemonUrl = params.get("daemon_url");
      const detailEl = document.getElementById("detail");
      const reason = params.get("reason");
      if (daemonUrl) {
        document.getElementById("daemon-url").textContent = daemonUrl;
      }
      if (reason) {
        detailEl.textContent = reason;
      }
      document.getElementById("retry").addEventListener("click", async () => {
        try {
          await window.__TAURI__.core.invoke("open_dashboard");
        } catch (e) {
          detailEl.textContent = `retry failed: ${e}`;
        }
      });
    </script>
  </body>
</html>
