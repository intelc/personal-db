name: whoop
description: Whoop daily cycles (strain, recovery, average HR)
permission_type: oauth
setup_steps:
  - type: env_var
    name: WHOOP_CLIENT_ID
    prompt: "Whoop OAuth client ID (from developer.whoop.com)"
  - type: env_var
    name: WHOOP_CLIENT_SECRET
    prompt: "Whoop OAuth client secret"
    secret: true
  - type: oauth
    provider: whoop
    client_id_env: WHOOP_CLIENT_ID
    client_secret_env: WHOOP_CLIENT_SECRET
    auth_url: "https://api.prod.whoop.com/oauth/oauth2/auth"
    token_url: "https://api.prod.whoop.com/oauth/oauth2/token"
    scopes: ["read:profile", "read:cycles"]
    redirect_host: localhost
    redirect_port: 9876
schedule:
  every: 6h
time_column: start
granularity: day
schema:
  tables:
    whoop_cycles:
      columns:
        id:                {type: TEXT,    semantic: "Whoop cycle id"}
        start:             {type: TEXT,    semantic: "ISO-8601 cycle start (UTC)"}
        end:               {type: TEXT,    semantic: "ISO-8601 cycle end (UTC)"}
        strain:            {type: REAL,    semantic: "0-21 daily strain"}
        average_heart_rate: {type: INTEGER, semantic: "bpm avg"}
related_entities: []
