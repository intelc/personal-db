# project_time — project definitions
#
# Each project lists the signals that count toward it:
#   repos       — GitHub repo full_names (matches github_commits.repo exactly)
#   cwds        — working directory paths (matches codex_sessions.cwd by exact-or-prefix,
#                 and claude_sessions.project_slug after re-encoding "/" -> "-")
#   bundle_ids  — macOS app bundle ids (matches screen_time_app_usage.bundle_id exactly)
#
# Edits to this file only re-attribute the last 2 days on `sync`.
# Run `personal-db backfill project_time` to recompute the full window.

cap_session_hours: 4.0    # max hours any single Claude/Codex session contributes

projects:
  - name: mosspath
    repos:      [intelc/mosspath]
    cwds:       [/Users/yihengchen/codestuff/aiexperiments/mosspath]
    bundle_ids: [intelchen.mosspath]

  - name: jarvis
    repos:      [intelc/jarvis, intelc/jarvis_explore]
    cwds:       [/Users/yihengchen/codestuff/aiexperiments/jarvis]
    bundle_ids: []

  - name: agentbox
    repos:      [intelc/agentbox]
    cwds:       [/Users/yihengchen/codestuff/aiexperiments/agentbox]
    bundle_ids: []

  - name: content_pipeline
    repos:      [intelc/content-ai-pipeline]
    cwds:       [/Users/yihengchen/codestuff/content-ai-pipeline]
    bundle_ids: []

  - name: hackaithon_26
    repos:      []
    cwds:
      - /Users/yihengchen/codestuff/hackaithon-26
      - /Users/yihengchen/codestuff2/hackaithon-26
    bundle_ids: []

  - name: memory_bench
    repos:      [intelc/memorybench]
    cwds:
      - /Users/yihengchen/codestuff/aiexperiments/memory_bench
      - /Users/yihengchen/codestuff/aiexperiments/memory-bench
      - /Users/yihengchen/codestuff/aiexperiments/LCVB-generation-evaluation
    bundle_ids: []

  - name: school_bioDB
    repos:      []
    cwds:       [/Users/yihengchen/codestuff/aiexperiments/biolDB]
    bundle_ids: []

  - name: school_ableton
    repos:      []
    cwds:       []
    bundle_ids: [com.ableton.live]

  - name: personal_db
    repos:      []
    cwds:       [/Users/yihengchen/codestuff/aiexperiments/personal-db]
    bundle_ids: []
