name: code_agent_activity
description: >-
  Coding-agent runtime state — Claude Code (via hooks) and Codex CLI (via rollout JSONL).
  Records session-level intervals (agent_running, awaiting_user, inactive) so efficiency,
  engagement, and prompt-cadence questions are answerable without leaving db.sqlite.
permission_type: none
local_only: true
schedule:
  every: 5m
time_column: timestamp
granularity: event

config:
  # Documentation-only for v1: parsed by ingest.py via a runtime fallback to True;
  # the Manifest model has no config field yet so this block is silently ignored.
  store_raw:
    type: bool
    default: true
    description: >-
      Store the original hook payload / rollout line in the events.raw column.
      Set false to drop incidental prompt-fragment text from disk.

setup_steps:
  - type: install_hooks
    title: Install Claude Code hooks
    description: >-
      One-click install of SessionStart, UserPromptSubmit, Stop, SessionEnd,
      PreToolUse, PostToolUse hooks (async; non-blocking) into
      ~/.claude/settings.json. Existing user hooks are preserved.
  - type: verify_hooks
    title: Verify hook installation
  - type: note
    title: Codex CLI requires no setup
    body: >-
      Codex CLI activity is read directly from ~/.codex/sessions/. Just keep
      using `codex` and the next sync will pick it up.

schema:
  tables:
    code_agent_events:
      columns:
        agent:       {type: TEXT,    semantic: "agent name, e.g. claude_code or codex"}
        session_id:  {type: TEXT,    semantic: "agent-assigned session identifier"}
        timestamp:   {type: TEXT,    semantic: "ISO-8601 UTC event timestamp"}
        event_type:  {type: TEXT,    semantic: "state-transition event type, e.g. session_start, user_prompt_submit, stop"}
        cwd:         {type: TEXT,    semantic: "working directory at event time"}
        git_branch:  {type: TEXT,    semantic: "git branch at event time when available"}
        source_file: {type: TEXT,    semantic: "originating hook payload file or rollout JSONL path"}
        raw:         {type: TEXT,    semantic: "original hook payload or rollout line JSON when store_raw is true"}
    code_agent_intervals:
      columns:
        agent:            {type: TEXT,    semantic: "agent name, e.g. claude_code or codex"}
        session_id:       {type: TEXT,    semantic: "agent-assigned session identifier"}
        start_ts:         {type: TEXT,    semantic: "ISO-8601 UTC interval start"}
        end_ts:           {type: TEXT,    semantic: "ISO-8601 UTC interval end"}
        state:            {type: TEXT,    semantic: "interval state: agent_running, awaiting_user, or inactive"}
        duration_seconds: {type: REAL,    semantic: "interval duration in seconds"}
        cwd:              {type: TEXT,    semantic: "working directory at interval start"}
        git_branch:       {type: TEXT,    semantic: "git branch at interval start when available"}
    code_agent_sessions:
      columns:
        agent:               {type: TEXT,    semantic: "agent name, e.g. claude_code or codex"}
        session_id:          {type: TEXT,    semantic: "agent-assigned session identifier"}
        cwd:                 {type: TEXT,    semantic: "absolute working directory; resolved from JSONL message metadata or hook events"}
        started_at:          {type: TEXT,    semantic: "ISO-8601 UTC, earliest user/assistant message timestamp"}
        last_msg_at:         {type: TEXT,    semantic: "ISO-8601 UTC, latest user/assistant message timestamp"}
        message_count:       {type: INTEGER, semantic: "user + assistant messages"}
        user_msg_count:      {type: INTEGER, semantic: "user messages"}
        assistant_msg_count: {type: INTEGER, semantic: "assistant messages"}
        first_user_prompt:   {type: TEXT,    semantic: "first user message text, truncated to 500 chars"}
        source_file:         {type: TEXT,    semantic: "absolute path of originating JSONL"}
