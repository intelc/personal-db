<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>{% block title %}personal_db{% endblock %}</title>
  <link rel="stylesheet" href="/static/vendor/ag-grid-community/35.3.0/ag-grid.min.css">
  <link rel="stylesheet" href="/static/vendor/ag-grid-community/35.3.0/ag-theme-quartz.min.css">
  <link rel="stylesheet" href="/static/style.css?v=finance-app-4">
  <script defer src="/static/vendor/ag-grid-community/35.3.0/ag-grid-community.min.js"></script>
  <script defer src="/static/vendor/ag-charts-community/13.3.0/ag-charts-community.min.js"></script>
  <script defer src="/static/pdb-grid.js?v=5"></script>
  <script defer src="/static/pdb-chart.js?v=12"></script>
  <script defer src="/static/pdb-app-state.js?v=1"></script>
  <script defer src="/static/pdb-finance.js?v=7"></script>
</head>
<body>
  <svg width="0" height="0" style="position:absolute">
    <defs>
      <pattern id="hatch" patternUnits="userSpaceOnUse" width="6" height="6" patternTransform="rotate(45)">
        <rect width="6" height="6" fill="#fff"/>
        <line x1="0" y1="0" x2="0" y2="6" stroke="#000" stroke-width="2"/>
      </pattern>
    </defs>
  </svg>
  <header class="masthead">
    <span class="logo">[ personal_db ]</span>
    <nav>
      <a href="/" {% if active=='dashboard' %}class="active"{% endif %}>dashboard</a>
      <a href="/a" {% if active=='apps' %}class="active"{% endif %}>apps</a>
      {% for t in nav_visible %}
        <a href="/t/{{ t }}" {% if active==t %}class="active"{% endif %}>{{ t }}</a>
      {% endfor %}
      {% if nav_overflow %}
        <details class="nav-more">
          <summary>more ▾</summary>
          <div class="nav-more-menu">
            {% for t in nav_overflow %}
              <a href="/t/{{ t }}">{{ t }}</a>
            {% endfor %}
          </div>
        </details>
      {% endif %}
    </nav>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
