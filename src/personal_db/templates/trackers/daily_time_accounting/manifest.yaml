name: daily_time_accounting
description: "Daily breakdown of how 24 hours was spent across categories (sleep, workout, work, communication, leisure)"
permission_type: none
setup_steps:
  - type: instructions
    text: |
      This tracker derives daily time totals from your other connectors:
        - whoop_sleep (sleep + naps)
        - whoop_workouts (exercise)
        - screen_time_app_usage (per-app categorization)

      App categorization lives at:
        <root>/trackers/daily_time_accounting/app_categories.yaml

      Edit it to match how YOU categorize your apps (uses macOS bundle IDs).
      Example:
        work:
          - com.todesktop.230313mzl4w4u92    # Cursor
          - com.mitchellh.ghostty
        leisure:
          - com.apple.Safari

      Time NOT covered by sleep + workout + categorized screen time goes to '_unaccounted'.
      This includes off-screen time AND any double-counting overlap (which shows as negative).

      Re-run sync after editing the YAML:
        personal-db sync daily_time_accounting
schedule:
  every: 1h
time_column: date
granularity: day
schema:
  tables:
    daily_time_accounting:
      columns:
        date:     {type: TEXT, semantic: "ISO-8601 local date YYYY-MM-DD"}
        category: {type: TEXT, semantic: "category from app_categories.yaml, or 'sleep', 'workout', '_unaccounted'"}
        hours:    {type: REAL, semantic: "hours in this category on this date"}
related_entities: []
